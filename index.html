<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIS - Official Asset Scan</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        body { 
            background: var(--bg-color); 
            color: var(--text-primary); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 24px; 
            border-top: 6px solid var(--accent-color); 
            max-width: 400px; 
            width: 90%;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); 
            display: none;
            text-align: left;
        }

        .img-container {
            width: 100%;
            height: 250px;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            background: #334155;
            border: 1px solid #475569;
        }

        img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        .info-group { margin-bottom: 15px; }
        .label { 
            color: var(--text-secondary); 
            font-size: 10px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 2px; 
        }
        .value { 
            font-size: 18px; 
            font-weight: 600; 
            color: var(--text-primary); 
            line-height: 1.2;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            background: var(--accent-color);
            color: #000;
            margin-top: 5px;
        }

        #loading { 
            color: var(--accent-color); 
            font-weight: bold; 
            letter-spacing: 1px;
        }

        .error-msg {
            color: #f87171;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="loading">📡 MENCARI DATA ASET...</div>
    
    <div id="app" class="card">
        <div class="img-container">
            <img id="p-img" src="" alt="Foto Aset">
        </div>
        
        <div class="info-group">
            <div class="label">Nama Barang</div>
            <div id="p-nama" class="value"></div>
        </div>

        <div class="info-group">
            <div class="label">Kode Aset</div>
            <div id="p-kode" class="value" style="color: var(--accent-color);"></div>
        </div>

        <div class="info-group">
            <div class="label">Kategori</div>
            <div id="p-kategori" class="value"></div>
        </div>
        
        <div class="info-group">
            <div class="label">Lokasi Penempatan</div>
            <div id="p-lokasi" class="value"></div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div class="info-group" style="margin-bottom: 0;">
                <div class="label">Kondisi</div>
                <div id="p-kondisi" class="badge"></div>
            </div>
            <div style="font-size: 11px; color: var(--text-secondary); font-weight: bold;" id="p-perolehan"></div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI API ---
        const SHEET_API = "https://script.google.com/macros/s/AKfycbyPXQM8-bKj0E3Nq8cPCT21SkgQQs0JxXJ3auyTSpdOm6Ajfd3fsrEh99XBC1lvO8uNUw/exec";
        
        async function loadData() {
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id'); 

            if (!targetId) {
                document.getElementById('loading').innerHTML = "❌ KODE TIDAK TERDETEKSI";
                return;
            }

            try {
                const response = await fetch(`${SHEET_API}?id=${encodeURIComponent(targetId)}`);
                const item = await response.json();

                if (item && !item.error) {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    
                    document.getElementById('p-nama').innerText = item.nama || "---";
                    document.getElementById('p-kategori').innerText = item.kategori || "---";
                    document.getElementById('p-kode').innerText = item.kode || "---";
                    document.getElementById('p-lokasi').innerText = item.lokasi || "---";
                    document.getElementById('p-kondisi').innerText = item.kondisi || "---";
                    
                    // Tampilkan Bulan & Tahun
                    const bulan = item.bulan || "";
                    const tahun = item.tahun || "";
                    document.getElementById('p-perolehan').innerText = (bulan || tahun) ? `${bulan} ${tahun}` : "";

                    // --- LOGIKA GAMBAR ---
                    const imgElement = document.getElementById('p-img');
                    let imgUrlFromSheet = item.gambar ? item.gambar.trim() : "";

                    // Jika di Sheets kosong, ambil default.jpg di folder img
                    if (imgUrlFromSheet === "" || imgUrlFromSheet === "-" || imgUrlFromSheet === "None") {
                        imgElement.src = "./img/default.jpg";
                    } else if (imgUrlFromSheet.startsWith('http')) {
                        imgElement.src = imgUrlFromSheet;
                    } else {
                        imgElement.src = "./img/default.jpg";
                    }

                    // Backup jika link di sheets mati atau file default.jpg tidak ada
                    imgElement.onerror = function() {
                        this.src = "https://via.placeholder.com/450x280/1e293b/38bdf8?text=AIS+ABHIJATI";
                    };

                } else {
                    document.getElementById('loading').innerHTML = `<div class="error-msg">❌ DATA TIDAK DITEMUKAN<br><small>${targetId}</small></div>`;
                }
            } catch (error) {
                document.getElementById('loading').innerText = "⚠️ GAGAL TERHUBUNG KE DATABASE";
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
